<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Considerando a figura abaixo, escreva um programa para cada forma que calcule e exiba em tela cada uma de suas respectivas áreas. O usuário irá informar os valores de cada variável.

            //Retângulo

            var baseR = prompt("Digite o valor da base do retângulo: ");
            var alturaR = prompt("Digite o valor da altura do retângulo: ");
            alert("A área do retângulo é: " + alturaR * baseR)

            //Quadrado

            var ladoQ = prompt("Digite o valor dos lados do quadrado: ");
            alert("A área do quadrado é: " + ladoQ * ladoQ + "m²")

            //Losango

            var diagonalmaiorL = prompt("Digite a diagonal maior do losango: ");
            var diagonalmenorL = prompt("Digite a diagonal menor do losango: ");
            alert("A área do losango é: " + (diagonalmaiorL * diagonalmenorL) / 2)

            //Trapézio

            var basemaiorT = prompt("Digite o valor da base maior do trapézio: ");
            var basemenorT = prompt("Digite o valor da base menor do trapézio: ");
            var alturaT = prompt("Digite o valor da altura do trapézio: ");
            alert("A área do trapézio é: " + (basemaiorT + basemenorT) * alturaT /2)

            //Paralelogramo

            var baseP = prompt("Digite o valor da base do paralelogramo: ");
            var alturaP = prompt("Digite o valor da altura do paralelogramo: ");
            alert("A área do paralelogramo é: " + baseP * alturaP)

            //Triângulo

            var baseTRI = prompt("Digite o valor da base do triângulo: ");
            var alturaTRI = prompt("Digite o valor da altura do triângulo: ");
            alert("A área do triângulo é: " + (baseTRI * alturaTRI) /2)

            //Círculo

            var raio = prompt("Digite o valor do raio do círculo: ");
            alert("A área do círculo é: " + 3,14 * (raio * raio))
    </script>
</body>
</html>
